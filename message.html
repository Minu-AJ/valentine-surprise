<!DOCTYPE html>
<html>
<head>
    <title>My Heart ❤️</title>
    <style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        color: white;
        overflow: hidden;
        background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ff758c, #ff7eb3);
        background-size: 400% 400%;
        animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .container {
        margin-top: 120px;
        padding: 20px;
        position: relative;
        z-index: 2;
    }

    h1 {
        text-shadow: 0 0 10px #fff, 0 0 20px pink;
    }

    #typing {
        font-size: 22px;
        width: 70%;
        margin: auto;
        min-height: 80px;
        line-height: 1.6;
    }

    #loveGif {
        display: none;
        margin: 30px auto;
        width: 250px;
        border-radius: 15px;
        opacity: 0;
        transform: scale(0.8);
        transition: opacity 1.5s ease, transform 1.5s ease;
    }

    /* Floating Hearts */
    .heart {
        position: fixed;
        bottom: -10px;
        color: white;
        font-size: 20px;
        animation: floatUp 6s linear infinite;
        opacity: 0.7;
    }

    @keyframes floatUp {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-100vh); opacity: 0; }
    }
    </style>

</head>

<body>

    <!-- Background Music -->
    <audio autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Read Slowly ❤️</h1>
        <div id="typing"></div>

        <img src="https://media2.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3Z2x4enA0d2djZ2xkemUyNmlja3p2Mnhsenl3bjg4eDVlMGd5ZTNoMiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/yc2pHdAoxVOrJ2m5Ha/200.webp" 
            id="loveGif"
            alt="Love Animation">

    </div>

    <script>
    const text = "Happy Valentine's Day, my love ❤️.........................................................................................";
    let i = 0;
    
    // Floating Hearts Generator
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 15 + "px";
        heart.style.animationDuration = Math.random() * 3 + 3 + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }, 500);


    function typeWriter() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 50);
        } else {
                const gif = document.getElementById("loveGif");
                gif.style.display = "block";

                setTimeout(() => {
                    gif.style.opacity = "1";
                    gif.style.transform = "scale(1)";
                }, 100);
            }

    }

    window.onload = typeWriter;
    </script>



</body>
</html>
